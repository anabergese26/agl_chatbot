<!DOCTYPE html>
  <html lang="de">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Webchat</title>
  </head>
  <body>
      <h1>Italy AGL Allianz</h1>

      <script src="https://github.com/Cognigy/Webchat/releases/latest/download/webchat.js"></script>
      <script>
        (function () {
          // Evitar múltiples instancias si el script se carga más de una vez
          if (window.__cognigyAutoClickObserver) {
            window.__cognigyAutoClickObserver.disconnect();
          }
        
          const ROOT_SELECTOR = '[data-cognigy-webchat-root="true"]';
          const BTN_SELECTOR  = '[data-test="webchat-start-chat-button"]';
        
          const rootEl = document.querySelector(ROOT_SELECTOR);
          if (!rootEl) return;
        
          const observer = new MutationObserver((mutations) => {
            for (const mutation of mutations) {
              if (mutation.type !== 'childList' || mutation.addedNodes.length === 0) continue;
        
              for (const node of mutation.addedNodes) {
                if (node.nodeType !== Node.ELEMENT_NODE) continue;
        
                const btn = node.id === 'webchatWindow'
                  ? node.querySelector(BTN_SELECTOR)
                  : (node.matches?.(BTN_SELECTOR) ? node : node.querySelector?.(BTN_SELECTOR));
        
                if (btn) {
                  setTimeout(() => btn.click(), 150);
                  return;
                }
              }
            }
          });
        
          observer.observe(rootEl, { childList: true, subtree: true });
          window.__cognigyAutoClickObserver = observer;
        })();
      </script>
      <script>
          initWebchat(
              "https://endpoint-eu-dev-cai.cognigy.cloud/bd318f3d4b8008affb6f70ee30402228f52d8444f47be4ece2f3dd752c5faf1a"
          );

          const observer = new MutationObserver(() => {
              const startBtn = document.querySelector('[data-test="webchat-start-chat-button"]');
              if (startBtn) {
                  observer.disconnect();

                  document.addEventListener('click', (e) => {
                      if (e.target.closest('[data-cognigy-webchat-toggle]')) {
                          startBtn.click();
                          startBtn.blur();
                      }
                  });
              }
          });
          observer.observe(document.body, { childList: true, subtree: true });
      </script>

  </body>
  </html>
